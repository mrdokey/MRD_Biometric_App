name: Build MRD Biometric Engine (Windows Exe)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build and Publish Standalone Exe
      run: dotnet publish MRD_Engine.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish_output

    - name: Pack with Public Folder
      run: |
        Copy-Item -Path .\public -Destination .\publish_output\public -Recurse

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MRD_Biometric_App_Windows_x64
        path: publish_output/
